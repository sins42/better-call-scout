steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/better-call-scout/app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/better-call-scout/app:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/better-call-scout/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - better-call-scout
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/better-call-scout/app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=600'
      - '--concurrency=4'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=true'
      - '--set-secrets=GITHUB_TOKEN=GITHUB_TOKEN:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest,HF_TOKEN=HF_TOKEN:latest,PRODUCT_HUNT_TOKEN=PRODUCT_HUNT_TOKEN:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/better-call-scout/app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/better-call-scout/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
